services:
  init_rsa_keys:
    image: alpine:3.20
    networks:
      - app-network
    volumes:
      - jwt-keys:/keys
    command: >
      sh -c "
        apk update &&
        apk add --no-cache openssl &&
        echo 'Generating RSA key pair...' &&
        openssl genpkey -algorithm RSA -out /keys/private_key.pem -pkeyopt rsa_keygen_bits:2048 &&
        openssl rsa -pubout -in /keys/private_key.pem -out /keys/public_key.pem &&
        echo 'Key pair generated successfully! Fixing key file permissions...' &&
        chown 1001:1001 /keys/private_key.pem /keys/public_key.pem &&
        chmod 600 /keys/private_key.pem /keys/public_key.pem &&
        chmod 644 /keys/public_key.pem &&
        echo 'Fixed permissions for key pair' &&
        ls -lA /keys/
      "
    restart: 'no'

  nginx: 
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - app-network
    restart: unless-stopped

  web:
    image: ghcr.io/62595-fullstack-gruppe-placeholder/reporacoon/web:latest
    build:
      context: ./web
      dockerfile: Dockerfile
    pull_policy: always # always pull fresh images for deployment. overridden locally
    environment:
      DATABASE_URL: postgresql://root:fisk@postgres:5432/reporacoondb?sslmode=disable
      NEXT_TELEMETRY_DISABLED: 1
      JWT_PRIVATE_KEY_PATH: /keys/private_key.pem
      JWT_PUBLIC_KEY_PATH: /keys/public_key.pem
      NEXT_PUBLIC_APP_URL: http://localhost #should prolly change on server
    volumes:
      - jwt-keys:/keys:ro # mount RSA keys as read only
      - ./ignoreSettingsConfig.json:/app/ignoreSettingsConfig.json:ro
    depends_on:
      init_rsa_keys:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - app-network
    env_file:
      - ./web/.env.local

  scraper:
    image: ghcr.io/62595-fullstack-gruppe-placeholder/reporacoon/scraper:latest
    build:
      context: ./scraper
      dockerfile: Dockerfile
    pull_policy: always # always pull fresh images for deployment. overridden locally
    environment:
      DATABASE_URL: postgresql://root:fisk@postgres:5432/reporacoondb?sslmode=disable
    volumes:
      - ./ignoreSettingsConfig.json:/app/ignoreSettingsConfig.json:ro
    ports:
      - "5001:5001"
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - app-network

  migrator:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: fisk
      PGHOST: postgres
      PGUSER: root
      PGDATABASE: reporacoondb
    volumes:
      - ./migrations:/migrations:ro
    networks:
      - app-network
    command: >
      sh -c "
        until pg_isready -h $$PGHOST -p 5432 -U $$PGUSER -d $$PGDATABASE; do 
          echo 'Waiting for postgres...'; sleep 2; 
        done &&
        find /migrations -name '*.sql' -type f | sort | while read file; do
          echo \"Running $$file\" &&
          psql -h $$PGHOST -U $$PGUSER -d $$PGDATABASE -f \"$$file\" &&
          echo \"✓ Completed $$file\";
        done &&
        echo 'Migrations done'
      "
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reporacoondb
      POSTGRES_USER: root
      POSTGRES_PASSWORD: fisk
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=root"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d reporacoondb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network

volumes:
  postgres_data:
  jwt-keys:

networks:
  app-network:
    driver: bridge