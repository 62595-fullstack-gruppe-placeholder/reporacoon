name: Build & Deploy to VM
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and push web
      uses: docker/build-push-action@v6
      with:
        context: ./web
        push: true
        tags: ghcr.io/${{ github.repository }}/web:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build and push scraper
      uses: docker/build-push-action@v6
      with:
        context: ./scraper
        push: true
        tags: ghcr.io/${{ github.repository }}/scraper:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          TOKEN_ENCRYPTION_KEY=${{ secrets.TOKEN_ENCRYPTION_KEY }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          cd /home/${{ secrets.VM_USERNAME }}/reporacoon
          echo "TOKEN_ENCRYPTION_KEY=${{ secrets.TOKEN_ENCRYPTION_KEY }}" > .env
          git pull origin main
          chmod +x cron/*
          docker compose pull
          docker compose up -d --remove-orphans
          docker compose ps
          nohup docker system prune -a -f > /tmp/docker-prune.log 2>&1 &
