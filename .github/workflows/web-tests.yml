name: Web tests

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'web/**'
      - '.github/workflows/web-tests.yml'
      - '.github/workflows/lighthouse.yml'
      - '.github/workflows/playwrigt.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'web/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./web
        
    steps:

      
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run Vitest Tests 
      - name: Run unit tests
        run: npm test

      # Build Next.js app
      - name: Build Next.js
        run: npm run build

      - name: Test build output
        run: |
          npm start &
          sleep 10
          curl -f http://localhost:3000 || exit 1
